version: "3.9"

# Start everything:
#   docker-compose up --build
#
# Stop everything:
#   docker-compose down
#
# Stop and wipe all data (fresh start):
#   docker-compose down -v
#
# Host ports:
#   8080 → api-gateway      ← Postman target
#   8081 → auth-service
#   8082 → vehicle-service
#   8083 → booking-service
#   3305 → auth-mysql
#   3307 → vehicle-mysql
#   3308 → booking-mysql
#   6379 → redis
#
# Observability ports:
#   9090 → Prometheus       ← metrics storage
#   3000 → Grafana          ← metrics dashboard  (admin/admin)
#   9411 → Zipkin           ← distributed traces

services:

  # ── Observability ────────────────────────────────────────────────────────────

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - rental-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - rental-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rental-network

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: rental-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rental-network

  auth-mysql:
    image: mysql:8.0
    container_name: auth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3305:3306"
    volumes:
      - auth-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rental-network

  vehicle-mysql:
    image: mysql:8.0
    container_name: vehicle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vehicle_db
      MYSQL_USER: vehicle_user
      MYSQL_PASSWORD: vehicle_pass
    ports:
      - "3307:3306"
    volumes:
      - vehicle-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rental-network

  booking-mysql:
    image: mysql:8.0
    container_name: booking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: booking_db
      MYSQL_USER: booking_user
      MYSQL_PASSWORD: booking_pass
    ports:
      - "3308:3306"
    volumes:
      - booking-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rental-network

  # ── Application Services ────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-mysql:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SESSION_REDIS_NAMESPACE: auth:session
      ZIPKIN_HOST: zipkin
    depends_on:
      auth-mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rental-network

  vehicle-service:
    build:
      context: ./vehicle-service
      dockerfile: Dockerfile
    container_name: vehicle-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      MYSQL_HOST: vehicle-mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: vehicle_db
      MYSQL_USER: vehicle_user
      MYSQL_PASSWORD: vehicle_pass
      ZIPKIN_HOST: zipkin
    depends_on:
      vehicle-mysql:
        condition: service_healthy
    networks:
      - rental-network

  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      MYSQL_HOST: booking-mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: booking_db
      MYSQL_USER: booking_user
      MYSQL_PASSWORD: booking_pass
      VEHICLE_SERVICE_HOST: vehicle-service
      ZIPKIN_HOST: zipkin
    depends_on:
      booking-mysql:
        condition: service_healthy
      vehicle-service:
        condition: service_started
    networks:
      - rental-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_HOST: auth-service
      VEHICLE_SERVICE_HOST: vehicle-service
      BOOKING_SERVICE_HOST: booking-service
      ZIPKIN_HOST: zipkin
      REDIS_HOST: redis
    depends_on:
      - auth-service
      - vehicle-service
      - booking-service
    networks:
      - rental-network

# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  redis-data:
  auth-mysql-data:
  vehicle-mysql-data:
  booking-mysql-data:
  prometheus-data:
  grafana-data:

networks:
  rental-network:
    driver: bridge
