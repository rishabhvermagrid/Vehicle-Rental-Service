spring:
  application:
    name: auth-service

  # ── MySQL ──────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # ── Redis ──────────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ── Spring Session (Redis-backed) ─────────────────────────────────────────
  session:
    store-type: redis
    redis:
      namespace: auth:session
      flush-mode: on-save
    timeout: 3600s          # 1-hour session TTL

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8081
  servlet:
    context-path: /

# ── Observability ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    org.rishabh.authservice: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
