global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  # vehicle-service and booking-service have context-path /api
  # so actuator endpoints are under /api/actuator/
  - job_name: 'vehicle-service'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['vehicle-service:8082']

  - job_name: 'booking-service'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['booking-service:8083']
